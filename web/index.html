<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_attendance_tracker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>flutter_attendance_tracker</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body,
    html {
      background: linear-gradient(to bottom right, #868481, #c3bfba, hsl(38, 9%, 83%));
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* LOGO ANIMATION */
    .logo {
      width: 250px;
      opacity: 1;
      /* always visible */
      transform: scale(0.5);
      animation: logoZoom 1s ease-out forwards;
    }

    @keyframes logoZoom {
      0% {
        transform: scale(1.5);
      }

      70% {
        transform: scale(2.2);
      }

      100% {
        transform: scale(2);
      }
    }

    /* TITLE ANIMATION */
    .title {
      margin-top: 15px;
      font-size: 28px;
      font-weight: bold;
      color: #1d0d0d;
      opacity: 0;
      transform: translateY(-50px);
      animation: dropDown 1s ease-out forwards;
      animation-delay: 1.0s;
    }

    /* LOGO ZOOM */
    @keyframes logoZoom {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }

      60% {
        opacity: 1;
        transform: scale(1.2);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* TITLE DROP */
    @keyframes dropDown {
      0% {
        opacity: 0;
        transform: translateY(-50px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="loader-container">
    <img src="assets/griet_logo.png" class="logo" />
    <div class="title">Timely Track</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
